<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Doraemon AI - Your Friendly Robot Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 800px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
            border-bottom: 4px solid #ffb347;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            background: #f8f9fa;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            margin-bottom: 10px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            justify-content: flex-end;
        }

        .bot-message {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .user-message .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot-message .message-bubble {
            background: #e9ecef;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .input-container {
            padding: 20px;
            background: white;
            border-top: 2px solid #e9ecef;
            display: flex;
            gap: 10px;
        }

        .input-container input,
        .input-container button {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .input-container input {
            flex: 1;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            color: #333;
        }

        .input-container input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-container button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            font-weight: bold;
            min-width: 100px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .input-container button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.6);
        }

        .input-container button:active {
            transform: translateY(0);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .special-button {
            padding: 8px 15px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s ease;
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
            font-weight: bold;
        }

        .special-button:hover {
            background: #667eea;
            color: white;
        }

        .start-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            gap: 20px;
        }

        .start-screen h2 {
            color: #667eea;
            font-size: 1.8em;
        }

        .start-screen input {
            padding: 12px 20px;
            font-size: 1em;
            border: 2px solid #667eea;
            border-radius: 10px;
            width: 100%;
        }

        .start-screen button {
            padding: 12px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .start-screen button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .loading {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            margin-left: 5px;
            animation: loading 0.6s infinite;
        }

        @keyframes loading {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        .status-message {
            text-align: center;
            font-size: 0.9em;
            color: #666;
            padding: 10px;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }

        @media (max-width: 600px) {
            .container {
                height: 100vh;
                max-height: none;
                border-radius: 0;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .message-bubble {
                max-width: 85%;
            }

            .start-screen {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Doraemon AI</h1>
            <p>Your Friendly Robot Assistant</p>
        </div>

        <div id="startScreen" class="start-screen">
            <h2>Welcome! 👋</h2>
            <p>What's your name?</p>
            <input 
                type="text" 
                id="userNameInput" 
                placeholder="Enter your name"
                onkeypress="if(event.key==='Enter') startChat()"
            >
            <button onclick="startChat()">Start Chat 🚀</button>
        </div>

        <div id="chatScreen" class="chat-container" style="display: none;">
            <div class="button-group" id="buttonGroup" style="display: none;">
                <button class="special-button" onclick="askForGadget()">🎯 Get Gadget</button>
                <button class="special-button" onclick="endChat()">👋 Say Goodbye</button>
            </div>
            <div id="messages"></div>
        </div>

        <div id="inputContainer" class="input-container" style="display: none;">
            <input 
                type="text" 
                id="messageInput" 
                placeholder="Type your message... (type 'bye' to exit)"
                onkeypress="if(event.key==='Enter') sendMessage()"
            >
            <button onclick="sendMessage()">Send</button>
        </div>

        <div id="statusMessage" class="status-message"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        let sessionId = null;
        let userName = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Doraemon AI Frontend Loaded ✨');
        });

        async function startChat() {
            const nameInput = document.getElementById('userNameInput');
            userName = nameInput.value.trim() || 'Friend';
            
            try {
                showStatus('Starting chat... ⏳');
                
                const response = await fetch(`${API_URL}/chat/start`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_name: userName,
                        session_id: userName.replace(' ', '_')
                    })
                });

                const data = await response.json();
                
                if (data.status === 'success') {
                    sessionId = data.session_id;
                    
                    // Hide start screen
                    document.getElementById('startScreen').style.display = 'none';
                    document.getElementById('chatScreen').style.display = 'flex';
                    document.getElementById('inputContainer').style.display = 'flex';
                    document.getElementById('buttonGroup').style.display = 'flex';
                    document.getElementById('statusMessage').style.display = 'none';
                    
                    // Add greeting message
                    addMessage('bot', data.message);
                } else {
                    showStatus('Error: ' + data.message);
                }
            } catch (error) {
                console.error('Error:', error);
                showStatus('Connection error. Make sure backend is running on http://localhost:5000');
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // Add user message to chat
            addMessage('user', message);
            input.value = '';
            
            // Scroll to bottom
            scrollToBottom();
            
            try {
                showStatus('Doraemon is thinking... 🤔');
                
                const response = await fetch(`${API_URL}/chat/message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sessionId,
                        message: message
                    })
                });

                const data = await response.json();
                
                if (data.status === 'success') {
                    addMessage('bot', data.message);
                    showStatus('');
                    
                    if (data.session_ended) {
                        endChatSession();
                    }
                } else {
                    addMessage('bot', '❌ ' + data.message);
                    showStatus('');
                }
            } catch (error) {
                console.error('Error:', error);
                addMessage('bot', '⚠️ Sorry, there was a connection error!');
                showStatus('');
            }
            
            scrollToBottom();
        }

        async function askForGadget() {
            try {
                showStatus('Pulling out gadget... ✨');
                
                const response = await fetch(`${API_URL}/chat/gadget?session_id=${sessionId}`, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });

                const data = await response.json();
                
                if (data.status === 'success') {
                    addMessage('bot', data.message);
                    showStatus('');
                } else {
                    addMessage('bot', '❌ ' + data.message);
                    showStatus('');
                }
            } catch (error) {
                console.error('Error:', error);
                addMessage('bot', '⚠️ Error getting gadget!');
                showStatus('');
            }
            
            scrollToBottom();
        }

        async function endChat() {
            try {
                showStatus('Saying goodbye... 👋');
                
                const response = await fetch(`${API_URL}/chat/goodbye`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId })
                });

                const data = await response.json();
                
                if (data.status === 'success') {
                    addMessage('bot', data.message);
                }
            } catch (error) {
                console.error('Error:', error);
            }
            
            setTimeout(endChatSession, 2000);
        }

        function endChatSession() {
            document.getElementById('chatScreen').style.display = 'none';
            document.getElementById('inputContainer').style.display = 'none';
            document.getElementById('buttonGroup').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
            document.getElementById('statusMessage').style.display = 'none';
            document.getElementById('userNameInput').value = '';
            document.getElementById('messages').innerHTML = '';
            sessionId = null;
        }

        function addMessage(sender, text) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + (sender === 'user' ? 'user-message' : 'bot-message');
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = text;
            
            messageDiv.appendChild(bubble);
            messagesDiv.appendChild(messageDiv);
        }

        function scrollToBottom() {
            const messagesDiv = document.getElementById('messages');
            setTimeout(() => {
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }, 0);
        }

        function showStatus(message) {
            const statusDiv = document.getElementById('statusMessage');
            if (message) {
                statusDiv.textContent = message;
                statusDiv.style.display = 'block';
            } else {
                statusDiv.style.display = 'none';
            }
        }
    </script>
</body>
</html>
